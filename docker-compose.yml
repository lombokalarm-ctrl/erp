version: '3.8'

services:
  erp-app:
    build: .
    container_name: erp-app
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgres://erp_user:erp_password@erp-db:5432/erp_db
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET:-super-secret-key-change-me-in-production}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-super-secret-refresh-key-change-me}
      - SEED_ADMIN_EMAIL=admin@apli.my.id
      - SEED_ADMIN_PASSWORD=adminapli
      - APP_ORIGIN=https://erp.apli.my.id
    depends_on:
      erp-db:
        condition: service_healthy
    volumes:
      - ./dist:/app/dist # Optional: Share built frontend files to host

  erp-db:
    image: postgres:15-alpine
    container_name: erp-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=erp_user
      - POSTGRES_PASSWORD=erp_password
      - POSTGRES_DB=erp_db
    ports:
      - "5432:5432"
    volumes:
      - erp-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erp_user -d erp_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  erp-pgdata:
